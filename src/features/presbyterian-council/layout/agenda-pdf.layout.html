<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<style>
			@page {
				size: A4;
				margin: 10mm 6mm;
			}

			:root {
				--bg: #f4f7fb;
				--surface: #ffffff;
				--surface-alt: #f8fbff;
				--border: #d9e4f2;
				--border-strong: #c6d8ee;
				--text: #162033;
				--muted: #64748b;
				--accent: #2563eb;
				--accent-soft: #eaf2ff;
				--shadow: 0 12px 36px rgba(15, 23, 42, 0.06);
				--page-height: 297mm;
				--pdf-margin-y: 12mm;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
				font-size: 12px;
				line-height: 1.5;
			}

			.page {
				width: 100%;
				height: calc(var(--page-height) - var(--pdf-margin-y));
				padding: 8px 10px 10px;
				display: flex;
			}

			.card {
				width: 100%;
				height: 100%;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 16px;
				box-shadow: var(--shadow);
				padding: 16px 18px 18px;
			}

			.card-title {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 16px;
				margin-bottom: 14px;
			}

			.card-title-left {
				min-width: 0;
			}

			h1 {
				margin: 0;
				font-size: 28px;
				line-height: 1.1;
				letter-spacing: -0.03em;
			}

			.card-title-right {
				display: flex;
				align-items: center;
				gap: 8px;
				flex-wrap: wrap;
				justify-content: flex-end;
			}

			.meta-pill {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 7px 11px;
				border-radius: 999px;
				background: #fff;
				border: 1px solid var(--border-strong);
				color: #1d4ed8;
				font-size: 12px;
				font-weight: 700;
				white-space: nowrap;
			}

			.table-wrap {
				overflow: hidden;
				border: 1px solid var(--border);
				border-radius: 14px;
				background: #fff;
			}

			table {
				width: 100%;
				border-collapse: separate;
				border-spacing: 0;
				table-layout: fixed;
			}

			col.col-index {
				width: 48px;
			}

			col.col-question {
				width: auto;
			}

			col.col-author {
				width: 170px;
			}

			col.col-topics {
				width: 280px;
			}

			col.col-timing {
				width: 82px;
			}

			thead th {
				padding: 11px 10px;
				text-align: left;
				font-size: 11px;
				font-weight: 800;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: #315ca8;
				background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
				border-bottom: 1px solid var(--border);
				white-space: nowrap;
			}

			thead th + th,
			tbody td + td {
				border-left: 1px solid var(--border);
			}

			tbody td {
				padding: 10px 10px;
				vertical-align: top;
				background: #fff;
				border-bottom: 1px solid var(--border);
			}

			tbody tr:nth-child(even) td {
				background: var(--surface-alt);
			}

			tbody tr:last-child td {
				border-bottom: 0;
			}

			tr {
				page-break-inside: avoid;
			}

			.index {
				text-align: center;
				font-size: 13px;
				font-weight: 800;
				color: #51637b;
			}

			.question-title {
				font-size: 13px;
				font-weight: 700;
				line-height: 1.32;
				word-break: break-word;
			}

			.author {
				font-size: 12px;
				font-weight: 700;
				line-height: 1.45;
				word-break: break-word;
			}

			.author-mark {
				display: inline;
				padding: 2px 7px 3px;
				border-radius: 4px;
				box-decoration-break: clone;
				-webkit-box-decoration-break: clone;
				color: var(--author-text);
				background: linear-gradient(
					transparent 10%,
					var(--author-bg) 10%,
					var(--author-bg) 98%,
					transparent 98%
				);
			}

			.badge-list {
				display: flex;
				flex-wrap: wrap;
				gap: 5px;
				align-items: flex-start;
			}

			.badge {
				display: inline-flex;
				align-items: center;
				padding: 3px 8px;
				border-radius: 999px;
				border: 1px solid transparent;
				font-size: 10px;
				font-weight: 700;
				line-height: 1.2;
				max-width: 100%;
				min-width: 0;
				overflow: hidden;
			}

			.badge-label {
				display: block;
				max-width: 100%;
				min-width: 0;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.timing {
				text-align: center;
				font-size: 13px;
				font-weight: 800;
				color: #334155;
				font-variant-numeric: tabular-nums;
				white-space: nowrap;
			}

			.empty {
				color: #94a3b8;
			}
		</style>
	</head>
	<body>
		<div class="page">
			<section class="card">
				<div class="card-title">
					<div class="card-title-left">
						<h1>Повестка на совет</h1>
					</div>
					<div class="card-title-right">
						<span class="meta-pill">__DATE_LABEL__</span>
						<span class="meta-pill">__TOTAL_LABEL__</span>
					</div>
				</div>

				<div class="table-wrap">
					<table>
						<colgroup>
							<col class="col-index" />
							<col class="col-question" />
							<col class="col-author" />
							<col class="col-topics" />
							<col class="col-timing" />
						</colgroup>
						<thead>
							<tr>
								<th>№</th>
								<th>Вопрос</th>
								<th>Автор</th>
								<th>Тема</th>
								<th>Время</th>
							</tr>
						</thead>
						<tbody>
							__ROWS__
						</tbody>
					</table>
				</div>
			</section>
		</div>
	</body>
</html>
